// The interop harness gRPC surface: exactly one protected operation, as the
// harness contract requires (../../CONTRACT.md). Every entry declaring a gRPC
// role implements this service; the go-0.12 reference entry defines it.
//
// In signed mode the request payload is empty and the credential rides in
// metadata (valiss-account-token, valiss-user-token, valiss-timestamp,
// valiss-signature, valiss-nonce). In message mode the payload carries the
// message bytes the token's checksum is bound to, and the token rides in
// valiss-message-token metadata.
//
// Accept: OK, with the response json field carrying the contract's accept
// shape. Reject: UNAUTHENTICATED, with the status message carrying the
// contract's reject JSON.
syntax = "proto3";

package valiss.interop.v1;

option go_package = "github.com/valiss-dev/interop/harness/go-0.13/interoppb";

service Interop {
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
}

message InvokeRequest {
  // payload is the message-mode body; empty in signed mode.
  bytes payload = 1;
}

message InvokeResponse {
  // json is the contract accept shape:
  // {"ok": true, "tenant": ..., "user": ...|null}.
  string json = 1;
}
