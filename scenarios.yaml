# Language-neutral interop scenario suite (ADR 0010). Each scenario names
# fixture creds, the request shape, and the expected outcome. The orchestrator
# runs every scenario in every (server entry × client entry × transport) cell
# derived from the harness/ manifests, unless `transport` pins one.
# Reason codes are the spec/SPEC-1.md §7 taxonomy.
#
# `requires` lists server capabilities (manifest server.features) the scenario
# depends on; a cell whose server lacks one reports the scenario as skipped.

scenarios:
  # --- signed-request mode (credential transports) ---
  - id: signed/account/valid
    mode: signed
    creds: account.creds
    expect: { accept: true, tenant: acme }

  - id: signed/user/valid
    mode: signed
    creds: user.creds
    expect: { accept: true, tenant: acme, user: alice }

  - id: signed/bearer/valid
    mode: signed
    creds: bearer.creds        # no seed; accepted without a request signature
    requires: [bearer]
    expect: { accept: true, user: alice }

  - id: signed/account/revoked
    mode: signed
    creds: revoked.creds       # valid token, account not in allowlist
    requires: [allowlist]
    expect: { accept: false, reason: not_allowlisted }

  - id: signed/expired
    mode: signed
    creds: expired.creds
    expect: { accept: false, reason: expired }

  - id: signed/wrong-key
    mode: signed
    creds: wrongkey.creds      # seed does not match token subject
    expect: { accept: false, reason: bad_request_signature }

  - id: signed/replay
    mode: signed
    creds: user.creds
    nonce: interop-nonce-1
    repeat: 2                  # first accepted, second is a replay
    requires: [replay]
    expect_last: { accept: false, reason: replay }

  # --- message-token mode (proof-of-origin transports) ---
  - id: message/valid
    mode: message
    creds: user.creds
    audience: interop://sink
    payload: fixture/payloads/hello.bin
    expect: { accept: true, tenant: acme, user: alice }

  - id: message/wrong-audience
    mode: message
    creds: user.creds
    audience: interop://other
    payload: fixture/payloads/hello.bin
    expect: { accept: false, reason: wrong_audience }

  - id: message/revoked-chain
    mode: message
    creds: revoked.creds       # valid chain, account not in allowlist
    audience: interop://sink
    payload: fixture/payloads/hello.bin
    requires: [allowlist]
    expect: { accept: false, reason: not_allowlisted }

  - id: message/checksum-mismatch
    mode: message
    creds: user.creds
    audience: interop://sink
    payload: fixture/payloads/hello.bin          # checksummed at mint
    tamper_payload: fixture/payloads/tampered.bin # bytes actually sent
    expect: { accept: false, reason: checksum_mismatch }

  - id: message/expired
    mode: message
    creds: user.creds
    audience: interop://sink
    payload: fixture/payloads/hello.bin
    ttl: -5m                   # already expired, outside the 2m skew
    expect: { accept: false, reason: expired }

  - id: message/detached-chain
    mode: message
    creds: user.creds
    audience: interop://sink
    payload: fixture/payloads/hello.bin
    chain: detached            # chain in the detached headers, not the token
    expect: { accept: true, tenant: acme, user: alice }

  - id: message/bare-signals-negotiation
    mode: message
    creds: user.creds
    audience: interop://sink
    payload: fixture/payloads/hello.bin
    chain: none                # bare token; server must signal chain-required
    expect: { accept: false, reason: no_chain, chain_required: true }

  - id: message/chain-negotiation
    mode: message
    creds: user.creds
    audience: interop://sink
    payload: fixture/payloads/hello.bin
    chain: negotiate           # bare first, retransmit detached on the signal
    expect: { accept: true, tenant: acme, user: alice }
